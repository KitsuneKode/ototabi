<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ototabi Mockup // Design 3: Synth Vapor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Space Grotesk", sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .futuristic-title {
        font-family: "Syne", sans-serif;
      }
      .neon-border {
        box-shadow:
          0 0 15px rgba(0, 240, 255, 0.15),
          inset 0 0 15px rgba(255, 0, 122, 0.1);
      }
      .neon-text-glow {
        text-shadow: 0 0 8px rgba(0, 240, 255, 0.5);
      }
      .scanlines {
        background: linear-gradient(rgba(18, 10, 36, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
        background-size: 100% 4px;
      }
    </style>
  </head>
  <body
    class="relative flex min-h-screen flex-col justify-between overflow-x-hidden bg-[#0A0518] text-[#F3EBF9]"
  >
    <!-- Scanlines overlay -->
    <div class="scanlines pointer-events-none fixed inset-0 z-50 opacity-40"></div>

    <!-- Grid background -->
    <div
      class="pointer-events-none fixed inset-0 z-0 opacity-[0.08]"
      style="
        background-image:
          linear-gradient(#ff007a 1px, transparent 1px),
          linear-gradient(90deg, #ff007a 1px, transparent 1px);
        background-size: 40px 40px;
      "
    ></div>

    <!-- Header -->
    <header
      class="relative z-10 mx-auto flex w-full max-w-5xl items-center justify-between border-b border-[#FF007A]/20 px-6 py-6"
    >
      <div class="flex items-center gap-3">
        <div class="size-2 animate-ping rounded-full bg-[#00F0FF]"></div>
        <span
          class="neon-text-glow futuristic-title text-sm font-extrabold tracking-[0.25em] text-[#00F0FF] uppercase"
        >
          OTOTABI // SYSTEM
        </span>
      </div>
      <span class="text-[9px] font-bold tracking-widest text-[#FF007A] uppercase"
        >SYS_MOCK_03 // NEON</span
      >
    </header>

    <!-- Main Content -->
    <main
      class="relative z-10 mx-auto flex w-full max-w-4xl flex-1 items-center justify-center p-6"
    >
      <div
        class="neon-border grid w-full grid-cols-1 gap-8 rounded-lg border border-[#FF007A]/30 bg-[#120A24]/85 p-8 backdrop-blur-md md:grid-cols-12"
      >
        <!-- Video Grid Column (7 cols) -->
        <div class="flex flex-col gap-4 md:col-span-7">
          <div
            class="relative flex aspect-video w-full items-center justify-center overflow-hidden rounded border border-[#00F0FF]/30 bg-[#05020B]"
          >
            <div
              class="bg-radial-gradient pointer-events-none absolute inset-0 from-transparent to-[#120A24]"
            ></div>

            <!-- Cyber Camera Overlay Grid -->
            <div
              class="pointer-events-none absolute inset-4 border border-dashed border-[#00F0FF]/10"
            ></div>

            <div class="relative z-10 space-y-1 text-center">
              <span class="block text-xs font-bold tracking-wider text-[#FF007A] uppercase"
                >LENS PREVIEW</span
              >
              <span class="text-[9px] tracking-widest text-zinc-500 uppercase"
                >INITIALIZING PHOTON CAPTURE</span
              >
            </div>

            <!-- Bottom Left Info -->
            <div
              class="absolute bottom-4 left-4 flex items-center gap-1.5 rounded bg-black/60 px-2 py-0.5 font-mono text-[8px] text-[#00F0FF]"
            >
              <span>RES: 1080P</span>
              <span class="text-zinc-500">|</span>
              <span>FPS: 60.00</span>
            </div>
          </div>

          {/* Input bar */}
          <div class="rounded border border-[#FF007A]/20 bg-[#0D071C] p-3">
            <div
              class="mb-1.5 flex items-center justify-between text-[9px] font-bold text-zinc-400 uppercase"
            >
              <span>Audio Waveform Capture</span>
              <span class="text-[#00F0FF]">ACTIVE</span>
            </div>
            <div class="flex h-1 items-stretch overflow-hidden rounded bg-[#1A0E35]">
              <div class="w-[55%] bg-gradient-to-r from-[#FF007A] to-[#00F0FF]"></div>
            </div>
          </div>
        </div>

        <!-- Settings Column (5 cols) -->
        <div class="flex flex-col justify-between space-y-6 md:col-span-5">
          <div class="space-y-4">
            <div>
              <h2
                class="futuristic-title text-2xl font-black tracking-wider text-[#F3EBF9] uppercase"
              >
                LINK TUNING
              </h2>
              <p class="text-[9px] font-bold tracking-wider text-[#FF007A] uppercase">
                CONFIGURE TELEMETRY SOURCES
              </p>
            </div>

            <div class="space-y-3">
              <div class="space-y-1">
                <label class="block text-[8px] font-bold tracking-widest text-[#00F0FF] uppercase"
                  >MIC_SOURCE</label
                >
                <div
                  class="rounded border border-[#00F0FF]/20 bg-[#05020B] px-3 py-2 font-mono text-xs text-zinc-300"
                >
                  [INPUT_01] AUDIO_DRV_DEFAULT
                </div>
              </div>

              <div class="space-y-1">
                <label class="block text-[8px] font-bold tracking-widest text-[#00F0FF] uppercase"
                  >CAM_SOURCE</label
                >
                <div
                  class="rounded border border-[#00F0FF]/20 bg-[#05020B] px-3 py-2 font-mono text-xs text-zinc-300"
                >
                  [LENS_01] CAPTURE_DRV_DEFAULT
                </div>
              </div>
            </div>
          </div>

          <button
            onclick="alert('Tuning Completed (Mockup Mode)')"
            class="h-11 w-full rounded bg-gradient-to-r from-[#FF007A] to-[#8000FF] text-xs font-bold tracking-wider text-white uppercase shadow-[0_0_15px_rgba(255,0,122,0.3)] transition-all duration-150 hover:from-[#ff2a94] hover:to-[#9624ff] hover:shadow-[0_0_20px_rgba(255,0,122,0.5)] active:scale-[0.98]"
          >
            INITIATE CONNECTION
          </button>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer
      class="relative z-10 mx-auto flex w-full max-w-5xl items-center justify-between border-t border-[#FF007A]/20 px-6 py-6 text-[9px] font-bold tracking-widest text-[#FF007A]/60 uppercase"
    >
      <span>CYBERPUNK RETROWAVE LAYOUT</span>
      <span>SYS_V1.99</span>
    </footer>
  </body>
</html>
