<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ototabi Mockup // Design 7: Pastel Blob</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Outfit", sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .clay-card {
        background: #ffffff;
        border: 3px solid #1c1924;
        border-radius: 24px;
        box-shadow: 6px 6px 0px 0px #1c1924;
      }
      .clay-button {
        border: 3px solid #1c1924;
        border-radius: 16px;
        box-shadow: 4px 4px 0px 0px #1c1924;
        transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      .clay-button:active {
        transform: translate(2px, 2px);
        box-shadow: 2px 2px 0px 0px #1c1924;
      }
    </style>
  </head>
  <body class="flex min-h-screen flex-col justify-between bg-[#ECEAF3] p-6 text-[#1C1924] sm:p-10">
    <!-- Header -->
    <header
      class="mx-auto flex w-full max-w-4xl items-center justify-between rounded-2xl border-3 border-[#1C1924] bg-white px-6 py-4 shadow-[4px_4px_0px_0px_#1C1924]"
    >
      <div class="flex items-center gap-2.5">
        <div
          class="size-3.5 animate-bounce rounded-full border-2 border-[#1C1924] bg-[#A594F2]"
        ></div>
        <span class="text-sm font-black tracking-wider uppercase"> OTOTABI / PLAY </span>
      </div>
      <span
        class="rounded-full border-2 border-[#A594F2]/30 bg-[#A594F2]/10 px-2 py-0.5 text-[10px] font-extrabold tracking-wider text-[#A594F2] uppercase"
        >DESIGN 07 // PASTEL</span
      >
    </header>

    <!-- Main Container -->
    <main class="mx-auto flex w-full max-w-xl flex-1 flex-col justify-center py-8">
      <div class="clay-card space-y-6 p-8">
        <div class="space-y-2 text-center">
          <div
            class="mx-auto inline-block rounded-full border-2 border-[#1C1924] bg-[#F4E3B1] px-3 py-1 text-xs font-black tracking-wider uppercase"
          >
            Ready to Record!
          </div>
          <h2 class="text-3xl leading-none font-black tracking-tight text-[#1C1924]">
            Lobby Setup Page
          </h2>
        </div>

        <!-- Preview Circle -->
        <div
          class="relative flex aspect-[4/3] w-full items-center justify-center overflow-hidden rounded-[32px] border-3 border-[#1C1924] bg-[#F5F4FA]"
        >
          <!-- Floating shapes background -->
          <div
            class="absolute top-[-30px] right-[-30px] size-24 rounded-full bg-[#FFD3B6]/50 blur-md"
          ></div>
          <div
            class="absolute bottom-[-20px] left-[-20px] size-24 rounded-full bg-[#D4F0F2]/60 blur-md"
          ></div>

          <div class="relative z-10 space-y-2 text-center">
            <p class="text-xs font-bold tracking-wider text-zinc-500 uppercase">
              Live stream feed standby
            </p>
            <p class="text-[10px] text-zinc-400">Press test button to start preview</p>
          </div>
        </div>

        <!-- Inputs -->
        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
          <div
            class="rounded-2xl border-3 border-[#1C1924] bg-white p-4 shadow-[3px_3px_0px_0px_#1C1924]"
          >
            <span class="mb-1 block text-[10px] font-bold text-zinc-500 uppercase">Mic Level</span>
            <div class="flex items-center gap-2">
              <div
                class="flex h-3 flex-1 items-stretch overflow-hidden rounded-full border-2 border-[#1C1924] bg-[#F5F4FA]"
              >
                <div class="w-[60%] bg-[#B5E2B9]"></div>
              </div>
              <span class="text-zinc-650 text-[10px] font-bold">60%</span>
            </div>
          </div>

          <div
            class="flex items-center justify-between rounded-2xl border-3 border-[#1C1924] bg-white p-4 shadow-[3px_3px_0px_0px_#1C1924]"
          >
            <div>
              <span class="mb-0.5 block text-[10px] font-bold text-zinc-500 uppercase"
                >Room Code</span
              >
              <span class="text-xs font-black text-[#A594F2] uppercase">PLAY-MINT-09</span>
            </div>
          </div>
        </div>

        <!-- Join Button -->
        <button
          onclick="alert('Entering Studio Lobby (Mockup Mode)')"
          class="clay-button w-full bg-[#A594F2] py-4 text-xs font-black tracking-wider text-white uppercase hover:bg-[#b0a1f5]"
        >
          Join Session &rarr;
        </button>
      </div>
    </main>

    <!-- Footer -->
    <footer
      class="mx-auto w-full max-w-4xl rounded-2xl border-3 border-[#1C1924] bg-white py-4 text-center text-[10px] font-bold tracking-wider text-zinc-500 uppercase shadow-[3px_3px_0px_0px_#1C1924]"
    >
      Pastel Blob // Round Friendly Claymorphism Design
    </footer>
  </body>
</html>
