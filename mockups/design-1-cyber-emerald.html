<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ototabi Mockup // Design 1: Cyber Emerald</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'JetBrains Mono', monospace;
      -webkit-font-smoothing: antialiased;
    }
    .pixel-grid {
      background-image: radial-gradient(rgba(16, 185, 129, 0.15) 1.5px, transparent 1.5px);
      background-size: 24px 24px;
    }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col relative overflow-x-hidden">
  <div class="pixel-grid fixed inset-0 pointer-events-none opacity-50 z-0"></div>

  <!-- Header -->
  <header class="relative z-10 border-b-4 border-black bg-zinc-900 px-6 py-4 flex justify-between items-center shadow-[0_4px_0_0_rgba(0,0,0,1)]">
    <div class="flex items-center gap-3">
      <span class="relative flex size-3">
        <span class="absolute inline-flex h-full w-full animate-ping rounded-full bg-emerald-400 opacity-75"></span>
        <span class="relative inline-flex rounded-full size-3 bg-emerald-500"></span>
      </span>
      <h1 class="text-sm font-black uppercase tracking-wider">
        OTOTABI // <span class="text-emerald-400">EMERALD</span>
      </h1>
    </div>
    <span class="text-xs text-zinc-500 font-bold uppercase">MOCKUP V1.0 // DESIGN 01</span>
  </header>

  <!-- Main Container -->
  <main class="relative z-10 flex-1 flex flex-col items-center justify-center p-6 max-w-4xl mx-auto w-full">
    <div class="w-full border-4 border-black bg-zinc-900 p-8 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] flex flex-col gap-6">
      <div>
        <span class="inline-block border border-emerald-500/30 bg-emerald-500/10 px-2 py-0.5 text-[10px] font-bold uppercase text-emerald-400 tracking-widest mb-2">
          Studio Lobby Setup
        </span>
        <h2 className="text-xl font-black uppercase tracking-wider text-zinc-100">
          Calibrate Input Feeds
        </h2>
      </div>

      <!-- Video Feed Placeholder -->
      <div class="relative w-full aspect-video border-4 border-black bg-zinc-950 flex flex-col items-center justify-center overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-t from-emerald-950/20 to-transparent pointer-events-none"></div>
        <div class="w-16 h-16 border-2 border-dashed border-zinc-800 flex items-center justify-center text-zinc-700 mb-2">
          [CAM]
        </div>
        <span class="text-[10px] text-zinc-500 uppercase tracking-widest font-bold">Local Video Stream Ready</span>
        
        <!-- UI overlay -->
        <div class="absolute bottom-3 left-3 border border-zinc-800 bg-black/90 px-2 py-0.5 text-[8px] uppercase text-emerald-400 font-bold flex items-center gap-1.5">
          <span class="size-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
          Feed: 720p // 30 FPS
        </div>
      </div>

      <!-- Controls -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="border-2 border-black bg-zinc-950 p-4 shadow-[3px_3px_0px_0px_rgba(0,0,0,1)]">
          <span class="text-[9px] text-zinc-500 uppercase font-bold block mb-1">Microphone Input</span>
          <p class="text-xs text-zinc-300 font-bold">Standard Audio Capture Device</p>
          <div class="mt-3 h-2 border border-black bg-zinc-900 flex items-stretch overflow-hidden">
            <div class="w-[65%] bg-emerald-400 animate-pulse"></div>
          </div>
        </div>

        <div class="border-2 border-black bg-zinc-950 p-4 shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] flex flex-col justify-between">
          <div>
            <span class="text-[9px] text-zinc-500 uppercase font-bold block mb-1">Room Code</span>
            <p class="text-xs text-emerald-400 font-black">OTOTABI-STUDIO-X90</p>
          </div>
        </div>
      </div>

      <!-- Actions -->
      <button 
        onclick="alert('Entering Studio (Mockup Mode)')"
        class="w-full py-4 border-2 border-black bg-emerald-500 text-black font-black uppercase tracking-wider text-sm shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:bg-emerald-400 hover:translate-x-[-1px] hover:translate-y-[-1px] hover:shadow-[5px_5px_0px_0px_rgba(0,0,0,1)] active:translate-x-[1px] active:translate-y-[1px] active:shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] transition-all duration-100"
      >
        Enter Studio Lobby &rarr;
      </button>
    </div>
  </main>

  <footer class="border-t-4 border-black bg-zinc-900 py-4 text-center text-[10px] text-zinc-600 uppercase tracking-widest relative z-10 mt-auto">
    Design 1: Cyber Emerald // Monospace High-Contrast Neo-Brutalist
  </footer>
</body>
</html>
