name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Format + Lint + Typecheck + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ototabi
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://user:password@localhost:5432/ototabi?schema=public"
      BETTER_AUTH_SECRET: ci-test-secret-do-not-use-in-production
      BETTER_AUTH_URL: http://localhost:8080
      FRONTEND_URL: http://localhost:3000
      LIVEKIT_URL: wss://ci-test.livekit.cloud
      LIVEKIT_API_KEY: ci-test-key
      LIVEKIT_API_SECRET: ci-test-secret
      PORT: 8080
      NODE_ENV: development
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Check formatting
        run: bun fmt:check

      - name: Lint
        run: bun lint

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Run migrations
        run: cd packages/store && bun run prisma migrate deploy

      - name: Type check
        run: bun typecheck

      - name: Build
        run: bun run build
