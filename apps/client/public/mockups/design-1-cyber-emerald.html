<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ototabi Mockup // Design 1: Cyber Emerald</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "JetBrains Mono", monospace;
        -webkit-font-smoothing: antialiased;
      }
      .pixel-grid {
        background-image: radial-gradient(rgba(16, 185, 129, 0.15) 1.5px, transparent 1.5px);
        background-size: 24px 24px;
      }
    </style>
  </head>
  <body class="relative flex min-h-screen flex-col overflow-x-hidden bg-zinc-950 text-zinc-100">
    <div class="pixel-grid pointer-events-none fixed inset-0 z-0 opacity-50"></div>

    <!-- Header -->
    <header
      class="relative z-10 flex items-center justify-between border-b-4 border-black bg-zinc-900 px-6 py-4 shadow-[0_4px_0_0_rgba(0,0,0,1)]"
    >
      <div class="flex items-center gap-3">
        <span class="relative flex size-3">
          <span
            class="absolute inline-flex h-full w-full animate-ping rounded-full bg-emerald-400 opacity-75"
          ></span>
          <span class="relative inline-flex size-3 rounded-full bg-emerald-500"></span>
        </span>
        <h1 class="text-sm font-black tracking-wider uppercase">
          OTOTABI // <span class="text-emerald-400">EMERALD</span>
        </h1>
      </div>
      <span class="text-xs font-bold text-zinc-500 uppercase">MOCKUP V1.0 // DESIGN 01</span>
    </header>

    <!-- Main Container -->
    <main
      class="relative z-10 mx-auto flex w-full max-w-4xl flex-1 flex-col items-center justify-center p-6"
    >
      <div
        class="flex w-full flex-col gap-6 border-4 border-black bg-zinc-900 p-8 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)]"
      >
        <div>
          <span
            class="mb-2 inline-block border border-emerald-500/30 bg-emerald-500/10 px-2 py-0.5 text-[10px] font-bold tracking-widest text-emerald-400 uppercase"
          >
            Studio Lobby Setup
          </span>
          <h2 className="text-xl font-black uppercase tracking-wider text-zinc-100">
            Calibrate Input Feeds
          </h2>
        </div>

        <!-- Video Feed Placeholder -->
        <div
          class="relative flex aspect-video w-full flex-col items-center justify-center overflow-hidden border-4 border-black bg-zinc-950"
        >
          <div
            class="pointer-events-none absolute inset-0 bg-gradient-to-t from-emerald-950/20 to-transparent"
          ></div>
          <div
            class="mb-2 flex h-16 w-16 items-center justify-center border-2 border-dashed border-zinc-800 text-zinc-700"
          >
            [CAM]
          </div>
          <span class="text-[10px] font-bold tracking-widest text-zinc-500 uppercase"
            >Local Video Stream Ready</span
          >

          <!-- UI overlay -->
          <div
            class="absolute bottom-3 left-3 flex items-center gap-1.5 border border-zinc-800 bg-black/90 px-2 py-0.5 text-[8px] font-bold text-emerald-400 uppercase"
          >
            <span class="size-1.5 animate-pulse rounded-full bg-emerald-400"></span>
            Feed: 720p // 30 FPS
          </div>
        </div>

        <!-- Controls -->
        <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
          <div class="border-2 border-black bg-zinc-950 p-4 shadow-[3px_3px_0px_0px_rgba(0,0,0,1)]">
            <span class="mb-1 block text-[9px] font-bold text-zinc-500 uppercase"
              >Microphone Input</span
            >
            <p class="text-xs font-bold text-zinc-300">Standard Audio Capture Device</p>
            <div
              class="mt-3 flex h-2 items-stretch overflow-hidden border border-black bg-zinc-900"
            >
              <div class="w-[65%] animate-pulse bg-emerald-400"></div>
            </div>
          </div>

          <div
            class="flex flex-col justify-between border-2 border-black bg-zinc-950 p-4 shadow-[3px_3px_0px_0px_rgba(0,0,0,1)]"
          >
            <div>
              <span class="mb-1 block text-[9px] font-bold text-zinc-500 uppercase">Room Code</span>
              <p class="text-xs font-black text-emerald-400">OTOTABI-STUDIO-X90</p>
            </div>
          </div>
        </div>

        <!-- Actions -->
        <button
          onclick="alert('Entering Studio (Mockup Mode)')"
          class="w-full border-2 border-black bg-emerald-500 py-4 text-sm font-black tracking-wider text-black uppercase shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] transition-all duration-100 hover:translate-x-[-1px] hover:translate-y-[-1px] hover:bg-emerald-400 hover:shadow-[5px_5px_0px_0px_rgba(0,0,0,1)] active:translate-x-[1px] active:translate-y-[1px] active:shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]"
        >
          Enter Studio Lobby &rarr;
        </button>
      </div>
    </main>

    <footer
      class="relative z-10 mt-auto border-t-4 border-black bg-zinc-900 py-4 text-center text-[10px] tracking-widest text-zinc-600 uppercase"
    >
      Design 1: Cyber Emerald // Monospace High-Contrast Neo-Brutalist
    </footer>
  </body>
</html>
