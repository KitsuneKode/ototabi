<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ototabi Mockup // Design 11: Clay Bento</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
      --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
    }
    body {
      font-family: 'Nunito', sans-serif;
      background-color: #FDF8F5;
      color: #3D3D3D;
    }
    
    .clay-card {
      background: #FFFFFF;
      border-radius: 32px;
      box-shadow: 
        8px 8px 24px rgba(214, 204, 196, 0.6), 
        -8px -8px 24px rgba(255, 255, 255, 1),
        inset 2px 2px 4px rgba(255, 255, 255, 0.8);
      border: 2px solid rgba(255, 255, 255, 0.5);
    }
    
    .clay-btn {
      background: #FF8B66;
      color: white;
      border-radius: 100px;
      box-shadow: 
        6px 6px 16px rgba(255, 139, 102, 0.3), 
        -4px -4px 12px rgba(255, 255, 255, 0.8),
        inset 2px 2px 4px rgba(255, 255, 255, 0.4),
        inset -2px -2px 6px rgba(0, 0, 0, 0.1);
      transition: transform 150ms var(--ease-out), box-shadow 150ms ease;
    }
    
    .clay-btn:active {
      transform: scale(0.95);
      box-shadow: 
        2px 2px 8px rgba(255, 139, 102, 0.2), 
        -2px -2px 6px rgba(255, 255, 255, 0.8),
        inset 4px 4px 8px rgba(0, 0, 0, 0.1),
        inset -2px -2px 4px rgba(255, 255, 255, 0.4);
    }

    .clay-inner {
      background: #FDF8F5;
      border-radius: 24px;
      box-shadow: 
        inset 6px 6px 12px rgba(214, 204, 196, 0.5), 
        inset -6px -6px 12px rgba(255, 255, 255, 0.9);
    }

    .pop-in {
      animation: popIn 600ms var(--spring) both;
    }
    .pop-in:nth-child(1) { animation-delay: 50ms; }
    .pop-in:nth-child(2) { animation-delay: 100ms; }
    .pop-in:nth-child(3) { animation-delay: 150ms; }
    .pop-in:nth-child(4) { animation-delay: 200ms; }

    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.8) translateY(20px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
  </style>
</head>
<body class="min-h-screen flex flex-col p-6">
  <header class="flex justify-between items-center mb-8 pop-in">
    <div class="clay-card px-6 py-3 font-bold text-xl text-[#FF8B66] flex items-center gap-2">
      <div class="w-3 h-3 rounded-full bg-[#FF8B66] animate-pulse"></div>
      Ototabi
    </div>
    <div class="clay-card px-4 py-2 text-sm font-semibold text-gray-400">
      Mockup 11
    </div>
  </header>

  <main class="flex-1 flex flex-col items-center justify-center max-w-5xl mx-auto w-full">
    <div class="grid grid-cols-1 md:grid-cols-12 gap-6 w-full">
      
      <!-- Video Feed -->
      <div class="clay-card col-span-12 md:col-span-8 p-4 flex flex-col pop-in h-[400px]">
        <div class="flex justify-between items-center mb-4 px-2">
          <h2 class="font-bold text-lg">Studio Preview</h2>
          <span class="bg-gray-100 text-gray-500 text-xs font-bold px-3 py-1 rounded-full">Offline</span>
        </div>
        <div class="clay-inner flex-1 flex flex-col items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#D6CCC4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-4"><path d="M23 7l-7 5 7 5V7z"></path><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
          <span class="text-gray-400 font-semibold text-sm">Waiting for camera...</span>
        </div>
      </div>

      <!-- Settings column -->
      <div class="col-span-12 md:col-span-4 flex flex-col gap-6">
        <div class="clay-card p-6 flex flex-col gap-4 pop-in">
          <div class="font-bold text-lg mb-2">Devices</div>
          
          <div class="clay-inner p-4 hover:scale-[1.02] transition-transform cursor-pointer">
            <div class="text-xs font-bold text-[#FF8B66] mb-1">Microphone</div>
            <div class="font-semibold text-sm text-gray-700">Default Audio Input</div>
          </div>
          
          <div class="clay-inner p-4 hover:scale-[1.02] transition-transform cursor-pointer">
            <div class="text-xs font-bold text-gray-400 mb-1">Speaker</div>
            <div class="font-semibold text-sm text-gray-700">System Audio Output</div>
          </div>
        </div>

        <button class="clay-btn w-full py-5 text-lg font-bold pop-in mt-auto">
          Join Room
        </button>
      </div>

    </div>
  </main>
</body>
</html>
