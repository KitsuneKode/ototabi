<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ototabi Mockup // Design 11: Clay Bento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
        --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
      }
      body {
        font-family: "Nunito", sans-serif;
        background-color: #fdf8f5;
        color: #3d3d3d;
      }

      .clay-card {
        background: #ffffff;
        border-radius: 32px;
        box-shadow:
          8px 8px 24px rgba(214, 204, 196, 0.6),
          -8px -8px 24px rgba(255, 255, 255, 1),
          inset 2px 2px 4px rgba(255, 255, 255, 0.8);
        border: 2px solid rgba(255, 255, 255, 0.5);
      }

      .clay-btn {
        background: #ff8b66;
        color: white;
        border-radius: 100px;
        box-shadow:
          6px 6px 16px rgba(255, 139, 102, 0.3),
          -4px -4px 12px rgba(255, 255, 255, 0.8),
          inset 2px 2px 4px rgba(255, 255, 255, 0.4),
          inset -2px -2px 6px rgba(0, 0, 0, 0.1);
        transition:
          transform 150ms var(--ease-out),
          box-shadow 150ms ease;
      }

      .clay-btn:active {
        transform: scale(0.95);
        box-shadow:
          2px 2px 8px rgba(255, 139, 102, 0.2),
          -2px -2px 6px rgba(255, 255, 255, 0.8),
          inset 4px 4px 8px rgba(0, 0, 0, 0.1),
          inset -2px -2px 4px rgba(255, 255, 255, 0.4);
      }

      .clay-inner {
        background: #fdf8f5;
        border-radius: 24px;
        box-shadow:
          inset 6px 6px 12px rgba(214, 204, 196, 0.5),
          inset -6px -6px 12px rgba(255, 255, 255, 0.9);
      }

      .pop-in {
        animation: popIn 600ms var(--spring) both;
      }
      .pop-in:nth-child(1) {
        animation-delay: 50ms;
      }
      .pop-in:nth-child(2) {
        animation-delay: 100ms;
      }
      .pop-in:nth-child(3) {
        animation-delay: 150ms;
      }
      .pop-in:nth-child(4) {
        animation-delay: 200ms;
      }

      @keyframes popIn {
        0% {
          opacity: 0;
          transform: scale(0.8) translateY(20px);
        }
        100% {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }
    </style>
  </head>
  <body class="flex min-h-screen flex-col p-6">
    <header class="pop-in mb-8 flex items-center justify-between">
      <div class="clay-card flex items-center gap-2 px-6 py-3 text-xl font-bold text-[#FF8B66]">
        <div class="h-3 w-3 animate-pulse rounded-full bg-[#FF8B66]"></div>
        Ototabi
      </div>
      <div class="clay-card px-4 py-2 text-sm font-semibold text-gray-400">Mockup 11</div>
    </header>

    <main class="mx-auto flex w-full max-w-5xl flex-1 flex-col items-center justify-center">
      <div class="grid w-full grid-cols-1 gap-6 md:grid-cols-12">
        <!-- Video Feed -->
        <div class="clay-card pop-in col-span-12 flex h-[400px] flex-col p-4 md:col-span-8">
          <div class="mb-4 flex items-center justify-between px-2">
            <h2 class="text-lg font-bold">Studio Preview</h2>
            <span class="rounded-full bg-gray-100 px-3 py-1 text-xs font-bold text-gray-500"
              >Offline</span
            >
          </div>
          <div class="clay-inner flex flex-1 flex-col items-center justify-center">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="48"
              height="48"
              viewBox="0 0 24 24"
              fill="none"
              stroke="#D6CCC4"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="mb-4"
            >
              <path d="M23 7l-7 5 7 5V7z"></path>
              <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
            </svg>
            <span class="text-sm font-semibold text-gray-400">Waiting for camera...</span>
          </div>
        </div>

        <!-- Settings column -->
        <div class="col-span-12 flex flex-col gap-6 md:col-span-4">
          <div class="clay-card pop-in flex flex-col gap-4 p-6">
            <div class="mb-2 text-lg font-bold">Devices</div>

            <div class="clay-inner cursor-pointer p-4 transition-transform hover:scale-[1.02]">
              <div class="mb-1 text-xs font-bold text-[#FF8B66]">Microphone</div>
              <div class="text-sm font-semibold text-gray-700">Default Audio Input</div>
            </div>

            <div class="clay-inner cursor-pointer p-4 transition-transform hover:scale-[1.02]">
              <div class="mb-1 text-xs font-bold text-gray-400">Speaker</div>
              <div class="text-sm font-semibold text-gray-700">System Audio Output</div>
            </div>
          </div>

          <button class="clay-btn pop-in mt-auto w-full py-5 text-lg font-bold">Join Room</button>
        </div>
      </div>
    </main>
  </body>
</html>
