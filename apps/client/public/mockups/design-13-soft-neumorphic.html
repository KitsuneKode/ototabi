<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ototabi Mockup // Design 13: Soft Neumorphic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-color: #e0e5ec;
        --shadow-light: #ffffff;
        --shadow-dark: #a3b1c6;
        --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
      }
      body {
        font-family: "Poppins", sans-serif;
        background-color: var(--bg-color);
        color: #4a5568;
      }

      .neu-flat {
        background: var(--bg-color);
        box-shadow:
          9px 9px 16px var(--shadow-dark),
          -9px -9px 16px var(--shadow-light);
        border-radius: 20px;
      }

      .neu-pressed {
        background: var(--bg-color);
        box-shadow:
          inset 6px 6px 10px var(--shadow-dark),
          inset -6px -6px 10px var(--shadow-light);
        border-radius: 20px;
      }

      .neu-btn {
        background: var(--bg-color);
        box-shadow:
          6px 6px 10px var(--shadow-dark),
          -6px -6px 10px var(--shadow-light);
        border-radius: 50px;
        transition: all 200ms var(--ease-out);
        cursor: pointer;
      }

      .neu-btn:active,
      .neu-btn.active {
        box-shadow:
          inset 4px 4px 8px var(--shadow-dark),
          inset -4px -4px 8px var(--shadow-light);
        transform: scale(0.98);
      }

      .fade-up {
        opacity: 0;
        transform: translateY(15px);
        animation: fadeUp 600ms var(--ease-out) forwards;
      }
      .delay-1 {
        animation-delay: 150ms;
      }
      .delay-2 {
        animation-delay: 300ms;
      }

      @keyframes fadeUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body class="relative flex min-h-screen flex-col items-center justify-center p-8">
    <header class="fade-up absolute top-8 right-8 left-8 flex items-center justify-between">
      <div class="flex items-center gap-2 text-xl font-semibold tracking-wide text-teal-600">
        <div class="neu-pressed flex h-8 w-8 items-center justify-center rounded-full">
          <div class="h-3 w-3 rounded-full bg-teal-500"></div>
        </div>
        Ototabi
      </div>
      <div class="text-sm font-medium opacity-60">Design 13: Neumorphic</div>
    </header>

    <main class="neu-flat fade-up mt-12 flex w-full max-w-3xl flex-col gap-8 p-10 delay-1">
      <div class="text-center">
        <h2 class="mb-2 text-2xl font-semibold">Configure Setup</h2>
        <p class="text-sm opacity-70">Adjust your peripherals before you start.</p>
      </div>

      <div
        class="neu-pressed relative flex aspect-video w-full flex-col items-center justify-center overflow-hidden"
      >
        <svg
          class="mb-3 h-12 w-12 text-teal-500/50"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"
          ></path>
        </svg>
        <span class="text-sm font-medium">Camera Disabled</span>
      </div>

      <div class="flex flex-col gap-6 sm:flex-row">
        <div class="neu-btn active flex flex-1 items-center gap-4 p-6">
          <div
            class="neu-pressed flex h-10 w-10 items-center justify-center rounded-full text-teal-500"
          >
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"
              ></path>
            </svg>
          </div>
          <div>
            <div class="text-xs font-semibold opacity-60">MIC</div>
            <div class="text-sm font-semibold">Realtek Audio</div>
          </div>
        </div>

        <div class="neu-btn flex flex-1 items-center gap-4 p-6">
          <div
            class="neu-flat flex h-10 w-10 items-center justify-center rounded-full text-gray-400"
          >
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"
              ></path>
            </svg>
          </div>
          <div>
            <div class="text-xs font-semibold opacity-60">CAM</div>
            <div class="text-sm font-semibold">None</div>
          </div>
        </div>
      </div>

      <div class="mt-4 flex justify-center">
        <button
          class="neu-btn px-12 py-4 font-bold tracking-wide text-teal-600 hover:text-teal-500"
        >
          JOIN ROOM
        </button>
      </div>
    </main>
  </body>
</html>
