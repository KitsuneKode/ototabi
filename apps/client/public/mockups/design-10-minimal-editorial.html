<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ototabi Mockup // Design 10: Minimal Editorial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,400&family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
      }
      body {
        font-family: "Inter", sans-serif;
        background-color: #fafafa;
        color: #111111;
      }
      h1,
      h2,
      h3,
      .serif {
        font-family: "Newsreader", serif;
      }

      .stagger-enter > * {
        opacity: 0;
        transform: translateY(10px);
        animation: fadeUp 500ms var(--ease-out) forwards;
      }
      .stagger-enter > *:nth-child(1) {
        animation-delay: 50ms;
      }
      .stagger-enter > *:nth-child(2) {
        animation-delay: 100ms;
      }
      .stagger-enter > *:nth-child(3) {
        animation-delay: 150ms;
      }
      .stagger-enter > *:nth-child(4) {
        animation-delay: 200ms;
      }

      @keyframes fadeUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .btn-press {
        transition:
          transform 150ms var(--ease-out),
          background-color 200ms ease;
      }
      .btn-press:active {
        transform: scale(0.96);
      }

      .fine-border {
        border: 1px solid #e5e5e5;
      }
    </style>
  </head>
  <body class="flex min-h-screen flex-col">
    <header class="flex items-center justify-between border-b border-gray-200 bg-white px-8 py-6">
      <div class="serif text-2xl font-medium tracking-tight">Ototabi</div>
      <span class="text-xs font-medium tracking-widest text-gray-400 uppercase"
        >Design X / Editorial</span
      >
    </header>

    <main class="mx-auto mt-10 flex w-full max-w-4xl flex-1 flex-col items-center p-8">
      <div class="stagger-enter flex w-full flex-col gap-10">
        <div class="mx-auto max-w-lg text-center">
          <h2 class="serif mb-4 text-4xl font-medium">Lobby Calibration</h2>
          <p class="text-sm leading-relaxed font-light text-gray-500">
            Please confirm your audio and visual inputs before proceeding into the studio recording
            session. Quality begins with clarity.
          </p>
        </div>

        <div
          class="fine-border group btn-press relative flex aspect-[21/9] w-full cursor-pointer items-center justify-center overflow-hidden bg-gray-100"
        >
          <div
            class="pointer-events-none absolute inset-0 bg-white/50 opacity-0 transition-opacity duration-300 group-hover:opacity-100"
          ></div>
          <span class="serif text-lg text-gray-400 italic">Visual feed pending...</span>
        </div>

        <div class="mx-auto grid w-full max-w-2xl grid-cols-1 gap-6 md:grid-cols-2">
          <div
            class="fine-border btn-press cursor-pointer bg-white p-6 transition-colors hover:border-gray-400"
          >
            <div class="mb-4 flex items-end justify-between">
              <span class="text-[10px] tracking-widest text-gray-400 uppercase"
                >Source / Audio</span
              >
              <span class="h-2 w-2 rounded-full bg-green-500"></span>
            </div>
            <p class="text-sm font-medium">Studio Microphone A</p>
          </div>

          <div
            class="fine-border btn-press cursor-pointer bg-white p-6 transition-colors hover:border-gray-400"
          >
            <div class="mb-4 flex items-end justify-between">
              <span class="text-[10px] tracking-widest text-gray-400 uppercase"
                >Source / Video</span
              >
              <span class="h-2 w-2 rounded-full bg-gray-300"></span>
            </div>
            <p class="text-sm font-medium">Camera off</p>
          </div>
        </div>

        <div class="mt-6 flex justify-center">
          <button
            class="btn-press bg-[#111] px-10 py-4 text-sm tracking-wide text-white hover:bg-gray-800 focus:ring-2 focus:ring-black focus:ring-offset-2 focus:outline-none"
          >
            ENTER STUDIO
          </button>
        </div>
      </div>
    </main>
  </body>
</html>
