<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ototabi Mockup // Design 10: Minimal Editorial</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: #FAFAFA;
      color: #111111;
    }
    h1, h2, h3, .serif {
      font-family: 'Newsreader', serif;
    }
    
    .stagger-enter > * {
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp 500ms var(--ease-out) forwards;
    }
    .stagger-enter > *:nth-child(1) { animation-delay: 50ms; }
    .stagger-enter > *:nth-child(2) { animation-delay: 100ms; }
    .stagger-enter > *:nth-child(3) { animation-delay: 150ms; }
    .stagger-enter > *:nth-child(4) { animation-delay: 200ms; }
    
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .btn-press {
      transition: transform 150ms var(--ease-out), background-color 200ms ease;
    }
    .btn-press:active {
      transform: scale(0.96);
    }

    .fine-border {
      border: 1px solid #E5E5E5;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">
  <header class="border-b border-gray-200 px-8 py-6 flex justify-between items-center bg-white">
    <div class="text-2xl font-medium serif tracking-tight">Ototabi</div>
    <span class="text-xs uppercase tracking-widest text-gray-400 font-medium">Design X / Editorial</span>
  </header>

  <main class="flex-1 flex flex-col items-center p-8 max-w-4xl mx-auto w-full mt-10">
    <div class="w-full flex flex-col gap-10 stagger-enter">
      
      <div class="text-center max-w-lg mx-auto">
        <h2 class="text-4xl serif font-medium mb-4">Lobby Calibration</h2>
        <p class="text-sm text-gray-500 font-light leading-relaxed">
          Please confirm your audio and visual inputs before proceeding into the studio recording session. Quality begins with clarity.
        </p>
      </div>

      <div class="w-full aspect-[21/9] bg-gray-100 fine-border flex items-center justify-center relative overflow-hidden group btn-press cursor-pointer">
        <div class="absolute inset-0 bg-white/50 opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none"></div>
        <span class="serif italic text-gray-400 text-lg">Visual feed pending...</span>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-2xl mx-auto">
        <div class="fine-border p-6 hover:border-gray-400 transition-colors cursor-pointer btn-press bg-white">
          <div class="flex justify-between items-end mb-4">
            <span class="text-[10px] uppercase tracking-widest text-gray-400">Source / Audio</span>
            <span class="w-2 h-2 rounded-full bg-green-500"></span>
          </div>
          <p class="text-sm font-medium">Studio Microphone A</p>
        </div>
        
        <div class="fine-border p-6 hover:border-gray-400 transition-colors cursor-pointer btn-press bg-white">
          <div class="flex justify-between items-end mb-4">
            <span class="text-[10px] uppercase tracking-widest text-gray-400">Source / Video</span>
            <span class="w-2 h-2 rounded-full bg-gray-300"></span>
          </div>
          <p class="text-sm font-medium">Camera off</p>
        </div>
      </div>

      <div class="flex justify-center mt-6">
        <button class="btn-press bg-[#111] text-white px-10 py-4 text-sm tracking-wide hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-black">
          ENTER STUDIO
        </button>
      </div>

    </div>
  </main>
</body>
</html>
