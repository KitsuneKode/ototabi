<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ototabi Mockup // Design 9: Glass Aurora</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
      --ease-in-out: cubic-bezier(0.77, 0, 0.175, 1);
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: #050505;
      overflow-x: hidden;
    }
    .orb-1 {
      position: absolute; top: -10%; left: 10%; width: 50vw; height: 50vw;
      background: radial-gradient(circle, rgba(147,51,234,0.15) 0%, rgba(0,0,0,0) 70%);
      filter: blur(60px); z-index: 0; pointer-events: none;
    }
    .orb-2 {
      position: absolute; bottom: -10%; right: 10%; width: 60vw; height: 60vw;
      background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, rgba(0,0,0,0) 70%);
      filter: blur(80px); z-index: 0; pointer-events: none;
    }
    
    .animate-enter {
      opacity: 0;
      transform: scale(0.96) translateY(12px);
      animation: enter 600ms var(--ease-out) forwards;
    }
    .delay-1 { animation-delay: 80ms; }
    .delay-2 { animation-delay: 160ms; }
    .delay-3 { animation-delay: 240ms; }
    
    @keyframes enter {
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .btn-polished {
      transition: transform 160ms var(--ease-out), filter 200ms ease, opacity 200ms ease, background-color 200ms ease;
    }
    .btn-polished:active {
      transform: scale(0.97);
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>
<body class="text-zinc-100 min-h-screen flex flex-col relative">
  <div class="orb-1"></div>
  <div class="orb-2"></div>

  <header class="relative z-10 glass-panel px-6 py-4 flex justify-between items-center m-4 rounded-2xl animate-enter">
    <div class="flex items-center gap-3">
      <div class="size-2.5 rounded-full bg-white shadow-[0_0_10px_rgba(255,255,255,0.8)]"></div>
      <h1 class="text-sm font-semibold tracking-wide">
        Ototabi <span class="text-zinc-500 ml-1">Studio</span>
      </h1>
    </div>
    <span class="text-xs text-zinc-500 font-medium px-3 py-1 bg-white/5 rounded-full border border-white/10">Design 09 // Glass Aurora</span>
  </header>

  <main class="relative z-10 flex-1 flex flex-col items-center justify-center p-6 max-w-5xl mx-auto w-full">
    <div class="w-full glass-panel rounded-[2rem] p-10 flex flex-col gap-8 animate-enter delay-1">
      <div class="flex flex-col gap-2">
        <h2 class="text-3xl font-medium tracking-tight bg-clip-text text-transparent bg-gradient-to-br from-white to-zinc-500">
          Ready to join?
        </h2>
        <p class="text-sm text-zinc-400">Configure your devices before entering the workspace.</p>
      </div>

      <div class="relative w-full aspect-video rounded-2xl bg-white/[0.02] border border-white/5 flex flex-col items-center justify-center overflow-hidden animate-enter delay-2">
        <span class="text-sm font-medium text-zinc-500">Camera preview inactive</span>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 animate-enter delay-3">
        <div class="glass-panel rounded-2xl p-5 flex flex-col gap-2 hover:bg-white/[0.04] cursor-pointer btn-polished">
          <span class="text-xs text-zinc-500 font-medium uppercase tracking-wider">Audio Input</span>
          <p class="text-sm text-zinc-200">Default Microphone</p>
        </div>
        <div class="glass-panel rounded-2xl p-5 flex flex-col gap-2 hover:bg-white/[0.04] cursor-pointer btn-polished">
          <span class="text-xs text-zinc-500 font-medium uppercase tracking-wider">Video Input</span>
          <p class="text-sm text-zinc-200">FaceTime HD Camera</p>
        </div>
      </div>

      <div class="flex justify-between items-center pt-4 animate-enter delay-3">
        <button class="btn-polished text-zinc-400 hover:text-white px-4 py-2 text-sm font-medium">Cancel</button>
        <button class="btn-polished bg-white text-black px-8 py-3 rounded-full text-sm font-semibold hover:bg-zinc-200 shadow-[0_0_20px_rgba(255,255,255,0.15)]">
          Join Session
        </button>
      </div>
    </div>
  </main>
</body>
</html>
