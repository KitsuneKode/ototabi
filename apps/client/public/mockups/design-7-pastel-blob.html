<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ototabi Mockup // Design 7: Pastel Blob</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .clay-card {
      background: #FFFFFF;
      border: 3px solid #1C1924;
      border-radius: 24px;
      box-shadow: 6px 6px 0px 0px #1C1924;
    }
    .clay-button {
      border: 3px solid #1C1924;
      border-radius: 16px;
      box-shadow: 4px 4px 0px 0px #1C1924;
      transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .clay-button:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px 0px #1C1924;
    }
  </style>
</head>
<body class="bg-[#ECEAF3] text-[#1C1924] min-h-screen flex flex-col justify-between p-6 sm:p-10">

  <!-- Header -->
  <header class="w-full max-w-4xl mx-auto flex justify-between items-center bg-white border-3 border-[#1C1924] rounded-2xl px-6 py-4 shadow-[4px_4px_0px_0px_#1C1924]">
    <div class="flex items-center gap-2.5">
      <div class="size-3.5 rounded-full bg-[#A594F2] border-2 border-[#1C1924] animate-bounce"></div>
      <span class="text-sm font-black uppercase tracking-wider">
        OTOTABI / PLAY
      </span>
    </div>
    <span class="text-[10px] text-[#A594F2] font-extrabold tracking-wider uppercase bg-[#A594F2]/10 border-2 border-[#A594F2]/30 px-2 py-0.5 rounded-full">DESIGN 07 // PASTEL</span>
  </header>

  <!-- Main Container -->
  <main class="w-full max-w-xl mx-auto flex-1 flex flex-col justify-center py-8">
    <div class="clay-card p-8 space-y-6">
      <div class="text-center space-y-2">
        <div class="mx-auto inline-block bg-[#F4E3B1] border-2 border-[#1C1924] px-3 py-1 rounded-full text-xs font-black uppercase tracking-wider">
          Ready to Record!
        </div>
        <h2 class="text-3xl font-black tracking-tight leading-none text-[#1C1924]">
          Lobby Setup Page
        </h2>
      </div>

      <!-- Preview Circle -->
      <div class="relative w-full aspect-[4/3] border-3 border-[#1C1924] bg-[#F5F4FA] rounded-[32px] overflow-hidden flex items-center justify-center">
        <!-- Floating shapes background -->
        <div class="absolute top-[-30px] right-[-30px] size-24 rounded-full bg-[#FFD3B6]/50 blur-md"></div>
        <div class="absolute bottom-[-20px] left-[-20px] size-24 rounded-full bg-[#D4F0F2]/60 blur-md"></div>

        <div class="text-center space-y-2 relative z-10">
          <p class="text-xs font-bold text-zinc-500 uppercase tracking-wider">Live stream feed standby</p>
          <p class="text-[10px] text-zinc-400">Press test button to start preview</p>
        </div>
      </div>

      <!-- Inputs -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div class="border-3 border-[#1C1924] bg-white p-4 rounded-2xl shadow-[3px_3px_0px_0px_#1C1924]">
          <span class="text-[10px] text-zinc-500 font-bold uppercase block mb-1">Mic Level</span>
          <div class="flex items-center gap-2">
            <div class="flex-1 h-3 border-2 border-[#1C1924] bg-[#F5F4FA] rounded-full overflow-hidden flex items-stretch">
              <div class="w-[60%] bg-[#B5E2B9]"></div>
            </div>
            <span class="text-[10px] font-bold text-zinc-650">60%</span>
          </div>
        </div>

        <div class="border-3 border-[#1C1924] bg-white p-4 rounded-2xl shadow-[3px_3px_0px_0px_#1C1924] flex items-center justify-between">
          <div>
            <span class="text-[10px] text-zinc-500 font-bold uppercase block mb-0.5">Room Code</span>
            <span class="text-xs font-black uppercase text-[#A594F2]">PLAY-MINT-09</span>
          </div>
        </div>
      </div>

      <!-- Join Button -->
      <button 
        onclick="alert('Entering Studio Lobby (Mockup Mode)')"
        class="w-full py-4 bg-[#A594F2] hover:bg-[#b0a1f5] text-white font-black uppercase tracking-wider text-xs clay-button"
      >
        Join Session &rarr;
      </button>
    </div>
  </main>

  <!-- Footer -->
  <footer class="w-full max-w-4xl mx-auto border-3 border-[#1C1924] bg-white rounded-2xl py-4 text-center text-[10px] text-zinc-500 font-bold uppercase tracking-wider shadow-[3px_3px_0px_0px_#1C1924]">
    Pastel Blob // Round Friendly Claymorphism Design
  </footer>
</body>
</html>
